services:
  postgres:
    image: postgres:16
    container_name: alignx-postgres
    environment:
      POSTGRES_DB: alignx
      POSTGRES_USER: alignx
      POSTGRES_PASSWORD: alignx
    ports:
      - "5432:5432"
    volumes:
      - alignx_pgdata:/var/lib/postgresql/data

volumes:
  alignx_pgdata:
